<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Smart Payment Gateway</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* 🌌 Animated Background */
body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(-45deg, #6a11cb, #2575fc, #ff6a00, #ee0979);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 💳 Glass Card */
.container {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    color: white;
    box-shadow: 0 0 40px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.9);}
    to {opacity: 1; transform: scale(1);}
}

h2 {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* 🔘 Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #00ffcc;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00ccaa;
}

/* 🎉 Popup */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
}

.popup-content {
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    animation: pop 0.4s ease;
}

@keyframes pop {
    from {transform: scale(0.5); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

.success {
    color: green;
}

.fail {
    color: red;
}

.close-btn {
    margin-top: 15px;
    padding: 8px 15px;
    border: none;
    background: black;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

</style>
</head>

<body>

<!-- 🎵 Background Music -->
<audio id="bgMusic" autoplay loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_4e3b4dfe42.mp3" type="audio/mp3">
</audio>

<div class="container">
    <h2>💳 Make Payment</h2>

    <input type="text" id="name" placeholder="Name">
    <input type="text" id="card" placeholder="Card Number">
    <input type="number" id="amount" placeholder="Amount">

    <button onclick="processPayment()">Pay Now</button>
</div>

<!-- 🎉 Popup -->
<div class="popup" id="popup">
    <div class="popup-content" id="popupContent">
        <h2 id="statusText"></h2>
        <button class="close-btn" onclick="closePopup()">Close</button>
    </div>
</div>

<script>

// 🎵 Force music play (mobile fix)
document.body.addEventListener('click', () => {
    document.getElementById('bgMusic').play();
}, { once: true });

function processPayment() {
    let name = document.getElementById('name').value;
    let card = document.getElementById('card').value;
    let amount = document.getElementById('amount').value;

    if (!name || !card || !amount) {
        showPopup("❌ Please fill all fields", false);
        return;
    }

    // Fake payment simulation
    let success = Math.random() > 0.3;

    setTimeout(() => {
        if (success) {
            showPopup("✅ Payment Successful!", true);
        } else {
            showPopup("❌ Payment Failed!", false);
        }
    }, 1500);
}

function showPopup(message, isSuccess) {
    let popup = document.getElementById('popup');
    let text = document.getElementById('statusText');

    text.innerText = message;
    text.className = isSuccess ? "success" : "fail";

    popup.style.display = "flex";
}

function closePopup() {
    document.getElementById('popup').style.display = "none";
}

</script>

</body>
</html>
