<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Smart Payment UI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* 🌌 Animated Gradient Background */
body {
    height: 100vh;
    background: linear-gradient(-45deg, #6a11cb, #2575fc, #00c9ff, #92fe9d);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 💳 Card */
.container {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.15);
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    color: white;
    box-shadow: 0 0 40px rgba(0,0,0,0.3);
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #00ffcc;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00ccaa;
}

/* Loader */
.loader {
    display: none;
    margin-top: 15px;
}

.loader div {
    width: 10px;
    height: 10px;
    margin: 5px;
    background: white;
    border-radius: 50%;
    display: inline-block;
    animation: bounce 1s infinite alternate;
}

.loader div:nth-child(2) { animation-delay: 0.2s; }
.loader div:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
    to { transform: translateY(-10px); }
}

/* Popup */
.popup {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    align-items:center;
    justify-content:center;
    background: rgba(0,0,0,0.7);
}

.popup-content {
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
}

.success { color:green; }
.fail { color:red; }

/* 🎵 Music Controls */
.music-control {
    position: absolute;
    top: 20px;
    right: 20px;
    color: white;
    font-size: 14px;
}

</style>
</head>

<body>

<!-- 🎵 Background Music 
<audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_9465b1b4f6.mp3?filename=calm-ambient-110997.mp3" type="audio/mp3">
</audio>-->

    <audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/audio/2022/10/25/audio_9465b1b4f6.mp3" type="audio/mp3">
    </audio>

<div class="music-control">
    🔊 Volume
    <input type="range" min="0" max="1" step="0.1" value="0.4" id="volumeControl">
    <button onclick="toggleMusic()">Mute</button>
</div>

<div class="container">
    <h2>💳 Secure Payment</h2>

    <input type="text" id="name" placeholder="Name">
    <input type="text" id="card" placeholder="Card Number">
    <input type="number" id="amount" placeholder="Amount">

    <button onclick="processPayment()">Pay Now</button>

    <div class="loader" id="loader">
        <div></div><div></div><div></div>
    </div>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2 id="statusText"></h2>
        <button onclick="closePopup()">Close</button>
    </div>
</div>

<script>

// 🎵 Start music on first interaction
window.addEventListener('click', () => {
    let music = document.getElementById('bgMusic');
    music.volume = 0.4;
    music.play();
}, { once: true });

// 🎛 Volume control
document.getElementById('volumeControl').addEventListener('input', function() {
    document.getElementById('bgMusic').volume = this.value;
});

// 🔇 Toggle
function toggleMusic() {
    let music = document.getElementById('bgMusic');
    if (music.paused) {
        music.play();
    } else {
        music.pause();
    }
}

// 💳 Payment Simulation
function processPayment() {
    let name = document.getElementById('name').value;
    let card = document.getElementById('card').value;
    let amount = document.getElementById('amount').value;

    if (!name || !card || !amount) {
        showPopup("❌ Fill all fields", false);
        return;
    }

    document.getElementById('loader').style.display = "block";

    setTimeout(() => {
        document.getElementById('loader').style.display = "none";

        let success = Math.random() > 0.3;

        if (success) {
            showPopup("✅ Payment Successful", true);
        } else {
            showPopup("❌ Payment Failed", false);
        }
    }, 2000);
}

// Popup
function showPopup(msg, ok) {
    document.getElementById('popup').style.display = "flex";
    let text = document.getElementById('statusText');
    text.innerText = msg;
    text.className = ok ? "success" : "fail";
}

function closePopup() {
    document.getElementById('popup').style.display = "none";
}

</script>

</body>
</html>
